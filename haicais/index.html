<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/css/style.css">
    <script type="module" src="/src/js/app.js"></script>
    <title>Haicais</title>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="border-botton">🍵 GERADOR DE HAICAIS</h1>
            <p>Poemas japoneses de três versos, capturando a asséncia da natureza.</p>
        </header>
        <main>
            <output class="haicais">
                <p class="verse1"></p>
                <p class="verse2"></p>
                <p class="verse3"></p>
            </output>
            <div class="actions">
                <button type="button" class="button-generate" title="gerar novo haicai">🌸 Gerar Novo Haicai</button>
                <button type="button" class="button-favorite close" title="icone favorito">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-heart-fill" viewBox="0 0 16 16">
                        <path fill-rule="evenodd" d="M8 1.314C12.438-3.248 23.534 4.735 8 15-7.534 4.736 3.562-3.248 8 1.314"/>
                    </svg>
                </button>
            </div>
        </main>
        <footer>
            <ul>
               
            </ul>
        </footer>
        <template>
             <li>
                <article>
                    <div class="text-favorite">
                        <p class="verse-favorite1">Ponto e vírgula,</p>
                        <p class="verse-favorite2">Escondido no escuro</p>
                        <p class="verse-favorite3">Caos no ecran.</p>
                    </div>
                    <button type="button" class="button-trash" title="botão de lixeira">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-trash" viewBox="0 0 16 16">
                            <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                            <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                        </svg>
                    </button>
                </article>
            </li>
        </template>
    </div>
</body>
</html>
