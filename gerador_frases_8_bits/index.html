<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/css/style.css">
    <script type="module" src="/src/js/app.js"></script>
    <title>Gerador de Frases 8-Bit</title>
</head>
<body>
    <header>
        <h1>Gerador 8-BIT</h1>
    </header>
    <main>
        <div class="container">
            <div class="display">
                <p>Não desista.</p>
            </div>
            <button type="button">Gerar Frase</button>
        </div>
        <div class="slider-container">
            <label for="speed">VELOCIDADE</label>
            <input type="range" id="speed" min="1" max="10" value="5">
            <span id="speedValue">5</span>
        </div>
    </main>
    <footer>
        <div class="counter">
            Frases geradas: <span>0</span>
        </div>
    </footer>
</body>
</html>
