<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/css/style.css">
    <script defer type="module" src="./src/js/main.js"></script>
    <title>Quiz</title>
</head>
<body>
    <main class="main">
        <section class="main__section-question">
            <header>
                <h1>Pontos: 0</h1>
                <h3>Pergunta:</h3>
                <h2>Quem descobriu o Brasil?</h2>
            </header>
            <ul class="main__answers-list">
                <template class="template-answers-item">
                    <li class="main__answer-item">
                        <b></b>
                        <p></p>
                    </li>
                </template>
            </ul>
            <footer>
                <ul class="main__actions-list">
                    <li class="main__action-item-confirme">
                        <button type="button" disabled>Confirme</button>
                    </li>
                    <li class="main__action-item-cancel">
                        <button type="button" disabled>Cancelar</button>
                    </li>
                    <li class="main__action-item-jump">
                        <button type="button" disabled>Pular (0/3)</button>
                    </li>
                </ul>
            </footer>
        </section>
        <section class="main__section-ranking">
            <ul class="main__ranking-list">
                <template class="template-ranking-item">
                    <li class="main__ranking-item">
                        <p class="main__ranking-item-name"></p>
                        <p class="main__ranking-item-points"></p>
                    </li>
                </template>
            </ul>
        </section>
    </main>
</body>
</html>
