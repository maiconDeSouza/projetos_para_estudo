<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./src/css/style.css">
    <script defer type="module" src="./src/js/main.js"></script>
    <title>Quiz</title>
</head>
<body>
    <aside class="area-questions">
        <ul class="area-questions__list">
            <template class="area-questions__template">
                <li class="area-questions__item">
                    <button></button>
                </li>
            </template>
        </ul>
    </aside>
    <main class="main">
        <header class="header">
            <h3>Pontos: 0</h3>
            <h1>Pergunta:</h1>
            <h2></h2>
        </header>
        <ul class="main__answers-list">
            <template class="main__answers-template">
                <li class="main__answers-item">
                    <b></b>
                    <p></p>
                </li>
            </template>
        </ul>
        <footer>
            <ul class="main__footer-list">
                <li class="main__footer-item">
                    <button type="button" class="main__footer-button-confirme" disabled>Confirmar</button>
                </li>
                <li class="main__footer-item">
                    <button type="button" class="main__footer-button-cancel" disabled>Cancelar</button>
                </li>
                <li class="main__footer-item">
                    <button type="button" class="main__footer-button-jump" disabled>(0/3) Pular</button>
                </li>
            </ul>
        </footer>
    </main>
    <aside class="ranking">
        <ul class="ranking__list">
            <template class="ranking__template">
                <li class="ranking__item">
                    <article>
                        <p class="ranking__name"></p>
                        <p class="ranking__points"></p>
                        <p class="ranking__time"></p>
                    </article>
                </li>
            </template>
        </ul>
    </aside>
</body>
</html>
