<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronômetro de Produtividade v2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        <section class="timer-card">
            <div class="input-group">
                <input type="text" id="cycleNameInput" placeholder="Nome do ciclo (ex: Estudar HTML)" autocomplete="off">
            </div>

            <h1 class="display" id="display">00:00</h1>
            
            <div class="controls">
                <button id="startBtn" class="btn start">Start</button>
                <button id="pauseBtn" class="btn pause" disabled>Pause</button>
                <button id="stopBtn" class="btn stop" disabled>Stop</button>
            </div>

            <div id="messageArea" class="message-area"></div>

            <div class="history-container">
                <h3>Últimos 10 Ciclos</h3>
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Data</th>
                            <th>Tempo</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody">
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
